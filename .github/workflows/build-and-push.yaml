name: Build all components and push to registry
on:
  push: {}
  workflow_dispatch: {}
jobs:
  build_pgo_and_push_to_registry:
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 30
          fetch-tags: true
          ref: ${{ github.ref }}
          submodules: true
      - name: Checkout pgmonitor
        uses: actions/checkout@v6
        with:
          repository: simar0at/pgmonitor
          path: pgmonitor
          fetch-depth: 30
          fetch-tags: true
          ref: v5-STABLE
          submodules: true
      - name: Get container Git describe tag and process pgmonitor exporter common scripts
        id: container_git_describe_tag
        run: |
          mkdir hack/tools/queries
          cp -av pgmonitor/postgres_exporter/common/* hack/tools/queries/
          rm -rf pgmonitor
          echo "ret=$(git describe --tags --always)" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create pgo tags based on git data
        id: meta
        uses: docker/metadata-action@v6
        with:
#          flavor: |
#            prefix=
          images: |
            ghcr.io/${{ github.repository }}/pgo
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.container_git_describe_tag.outputs.ret }}
      - name: Build and push pgo
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
#          build-args: |
#            ENV=var
          platforms: |
            linux/amd64
#            linux/arm64
          provenance: true
          sbom: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  build_postgres_old_and_push_to_registry:
