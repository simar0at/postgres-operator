      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create postgres ${{ env.version }} tags based on git data
        id: meta
        uses: docker/metadata-action@v6
        with:
          flavor: |
            prefix=${{ env.version }}-
          images: |
            ghcr.io/${{ github.repository }}/crunchy-postgres
